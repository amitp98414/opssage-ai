groups:
  - name: opssage-api-alerts
    rules:
      - alert: OpsSageAPIDown
        expr: up{job="opssage-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OpsSage API is down"
          description: "Prometheus cannot reach the OpsSage API for more than 1 minute."

      - alert: OpsSageAPIHighErrorRate
        expr: |
          100 *
          (sum(rate(http_requests_total{job="opssage-api",status=~"5.."}[5m])) or vector(0))
          /
          clamp_min(sum(rate(http_requests_total{job="opssage-api"}[5m])), 0.001)
          > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OpsSage API error rate is high"
          description: "The API error rate has remained above 5% for 5 minutes."

      - alert: OpsSageAPIHighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="opssage-api"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OpsSage API latency is high"
          description: "P95 API response time has remained above 1 second for 5 minutes."
